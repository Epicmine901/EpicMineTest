<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Natijalari</title>
  <link rel="stylesheet" href="stil.css">
  <style>
    /* Natija sahifasi uchun maxsus chiroyli qo'shimcha stillar */
    .result-container {
      background-color: #181818;
      border: 1px solid #333;
      padding: 40px;
      border-radius: 14px;
      width: 100%;
      max-width: 600px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .result-title {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 10px;
    }

    .subject-name {
      font-size: 18px;
      color: #aaa;
      margin-bottom: 30px;
      font-style: italic;
    }

    /* Doiraviy yoki katta foiz ko'rsatkichi */
    .score-circle {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: conic-gradient(#2e7d32 0%, #333 0%);
      margin: 0 auto 30px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
    }

    .score-circle::before {
      content: '';
      position: absolute;
      width: 130px;
      height: 130px;
      background-color: #181818;
      border-radius: 50%;
    }

    .score-text {
      position: relative;
      font-size: 36px;
      font-weight: 800;
      color: #ffffff;
      z-index: 2;
    }

    /* Statistika slayder bloki */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 35px;
    }

    .stat-card {
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 15px;
      border-radius: 10px;
    }

    .stat-label {
      font-size: 14px;
      color: #888;
      margin-bottom: 5px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
    }

    .stat-value.correct { color: #4caf50; }
    .stat-value.wrong { color: #f44336; }

    /* Tugmalar bloki */
    .result-buttons {
      display: flex;
      gap: 15px;
    }

    .btn-result {
      flex: 1;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      text-align: center;
    }

    .btn-home {
      background-color: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #ffffff;
    }

    .btn-home:hover {
      background-color: rgba(255, 255, 255, 0.05);
    }

    .btn-restart {
      background-color: #cc1818;
      border: 1px solid #e53935;
      color: #ffffff;
    }

    .btn-restart:hover {
      background-color: #e53935;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="top-header">
    <a href="index.html" class="brand-logo">EpicMineTest</a>
  </div>

  <div class="result-container">
    <h1 class="result-title">🎯 Test Yakunlandi</h1>
    <div class="subject-name" id="resSubject">Fan nomi yuklanmoqda...</div>

    <div class="score-circle" id="scoreCircle">
      <span class="score-text" id="scorePercent">0%</span>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">To'g'ri javob</div>
        <div class="stat-value correct" id="resCorrect">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Noto'g'ri javob</div>
        <div class="stat-value wrong" id="resWrong">0</div>
      </div>
    </div>

    <div class="result-buttons">
      <a href="index.html" class="btn-result btn-home">Bosh sahifa</a>
      <a href="#" id="btnRestart" class="btn-result btn-restart">Qayta topshirish</a>
    </div>
  </div>

  <script>
    async function initResult() {
  // 1. URL dan hamma parametrlarni o'qib olish
  const urlParams = new URLSearchParams(window.location.search);
  const fanId = urlParams.get('FanID');
  const togriJavoblar = parseInt(urlParams.get('togriJavob')) || 0;
  
  // Yangi qo'shilgan sozlamalar parametrlari
  const stratVal = urlParams.get('strat') || '1';
  const endVal = urlParams.get('end') || '10';
  const savolsVal = urlParams.get('savols') || '10';
  const modePage = urlParams.get('mode') || 'test.html'; // qaysi rejimdan kelgani

  const jamiSavollar = parseInt(savolsVal) || 10; 
  const notoScript = jamiSavollar - togriJavoblar;
  const foiz = Math.round((togriJavoblar / jamiSavollar) * 100) || 0;

  // 2. Elementlarni ekranga chiqarish
  document.getElementById('resCorrect').innerText = togriJavoblar;
  document.getElementById('resWrong').innerText = notoScript < 0 ? 0 : notoScript;
  document.getElementById('scorePercent').innerText = foiz + "%";

  const circle = document.getElementById('scoreCircle');
  circle.style.background = `conic-gradient(#2e7d32 ${foiz}%, #333 ${foiz}%)`;

  // 3. QAYTA TOPSHIRISH TUGMASINI SOZLACH (Aynan o'sha diapazon va rejim bilan)
  document.getElementById('btnRestart').href = `${modePage}?FanId=${fanId}&strat=${stratVal}&end=${endVal}&savols=${savolsVal}`;

  // 4. fanlar.json dan fanning haqiqiy nomini o'qib topish
  try {
    const response = await fetch('jsons/fanlar.json');
    if (response.ok) {
      const fanlar = await response.json();
      const joriyFan = fanlar.find(f => f.id == fanId);
      if (joriyFan) {
        document.getElementById('resSubject').innerText = joriyFan.Fan;
      } else {
        document.getElementById('resSubject').innerText = "Noma'lum fan";
      }
    }
  } catch (err) {
    console.error("Fan nomini yuklashda xatolik:", err);
    document.getElementById('resSubject').innerText = "Test Mode";
  }
}

    // Sahifa yuklanganda ishga tushadi
    window.onload = initResult;
  </script>

</body>
</html>
